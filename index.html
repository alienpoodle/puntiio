<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Puntiio | Loyalty Wallet</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Updated JsBarcode CDN as requested -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jsbarcode/3.11.3/JsBarcode.all.min.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, doc, deleteDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // --- Configuration & Initialization ---
        const firebaseConfig = JSON.parse(__firebase_config);
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'loyalty-card-wallet';

        // State Management
        let currentUser = null;
        let cards = [];
        let selectedCard = null;

        // UI Selectors
        const mainView = document.getElementById('main-view');
        const addCardView = document.getElementById('add-card-view');
        const cardDetailsView = document.getElementById('card-details-view');
        const cardList = document.getElementById('card-list');
        const emptyState = document.getElementById('empty-state');

        // --- Auth Logic (Rule 3) ---
        async function initApp() {
            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
            } catch (err) {
                console.error("Auth failed", err);
            }
        }

        onAuthStateChanged(auth, (user) => {
            currentUser = user;
            if (user) {
                setupDataListener();
            }
        });

        // --- Firestore Logic (Rule 1 & 2) ---
        function setupDataListener() {
            if (!currentUser) return;
            const q = collection(db, 'artifacts', appId, 'users', currentUser.uid, 'cards');
            
            onSnapshot(q, (snapshot) => {
                cards = snapshot.docs
                    .map(doc => ({ id: doc.id, ...doc.data() }))
                    .sort((a, b) => (b.createdAt || 0) - (a.createdAt || 0));
                renderCards();
            }, (error) => {
                console.error("Snapshot error:", error);
            });
        }

        async function saveCard(cardData) {
            if (!currentUser) return;
            try {
                await addDoc(collection(db, 'artifacts', appId, 'users', currentUser.uid, 'cards'), {
                    ...cardData,
                    createdAt: Date.now()
                });
                showView('main');
            } catch (err) {
                console.error("Save error", err);
            }
        }

        async function removeCard(id) {
            if (!currentUser) return;
            try {
                await deleteDoc(doc(db, 'artifacts', appId, 'users', currentUser.uid, 'cards', id));
                showView('main');
            } catch (err) {
                console.error("Delete error", err);
            }
        }

        // --- UI Logic ---
        window.showView = (viewName, data = null) => {
            [mainView, addCardView, cardDetailsView].forEach(el => el.classList.add('hidden'));
            
            if (viewName === 'main') mainView.classList.remove('hidden');
            if (viewName === 'add') addCardView.classList.remove('hidden');
            if (viewName === 'details') {
                selectedCard = data;
                cardDetailsView.classList.remove('hidden');
                // Ensure DOM has rendered before attempting barcode generation
                setTimeout(renderDetails, 50);
            }
        };

        function renderCards() {
            cardList.innerHTML = '';
            if (cards.length === 0) {
                emptyState.classList.remove('hidden');
                return;
            }
            emptyState.classList.add('hidden');

            cards.forEach(card => {
                const cardEl = document.createElement('div');
                cardEl.className = `relative overflow-hidden rounded-2xl p-6 mb-4 text-white shadow-lg cursor-pointer transform active:scale-95 transition-all`;
                cardEl.style.backgroundColor = card.color || '#4F46E5';
                cardEl.innerHTML = `
                    <div class="flex justify-between items-start mb-8">
                        <div>
                            <p class="text-xs uppercase tracking-widest opacity-80">${card.category}</p>
                            <h3 class="text-xl font-bold">${card.storeName}</h3>
                        </div>
                        <div class="bg-white/20 p-2 rounded-lg">
                            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"></path></svg>
                        </div>
                    </div>
                    <div class="flex justify-between items-end">
                        <span class="font-mono tracking-wider">${maskNumber(card.cardNumber)}</span>
                        <span class="text-xs opacity-70">Tap to Scan</span>
                    </div>
                `;
                cardEl.onclick = () => showView('details', card);
                cardList.appendChild(cardEl);
            });
        }

        function renderDetails() {
            if (!selectedCard) return;
            document.getElementById('details-title').innerText = selectedCard.storeName;
            document.getElementById('details-num').innerText = selectedCard.cardNumber;
            document.getElementById('details-header').style.backgroundColor = selectedCard.color;
            
            const barcodeEl = document.getElementById('barcode');
            
            const generate = () => {
                try {
                    // Check if JsBarcode is loaded in global scope
                    const JsBarcodeFunc = window.JsBarcode;
                    if (typeof JsBarcodeFunc === 'function') {
                        // INCREASED BARCODE SIZE: adjusted width, height, and display
                        JsBarcodeFunc(barcodeEl, selectedCard.cardNumber, {
                            format: "CODE128",
                            lineColor: "#000",
                            width: 3,        // Increased from 2 for thicker bars
                            height: 150,      // Increased from 100 for more vertical surface area
                            displayValue: false,
                            background: "#ffffff",
                            margin: 20        // More white space around to help scanner focus
                        });
                        console.log("Barcode generated successfully with optimized sizing");
                    } else {
                        // Retry loop if library is still loading
                        setTimeout(generate, 100);
                    }
                } catch (e) {
                    console.error("Barcode generation failed", e);
                }
            };

            generate();
        }

        function maskNumber(num) {
            if (num.length < 8) return num;
            return '•••• ' + num.slice(-4);
        }

        // Form Handling
        document.getElementById('card-form').onsubmit = (e) => {
            e.preventDefault();
            const formData = new FormData(e.target);
            const data = {
                storeName: formData.get('storeName'),
                cardNumber: formData.get('cardNumber'),
                category: formData.get('category'),
                color: formData.get('color')
            };
            saveCard(data);
            e.target.reset();
        };

        window.handleDelete = () => {
            const modal = document.createElement('div');
            modal.className = "fixed inset-0 bg-black/50 flex items-center justify-center p-6 z-[100]";
            modal.innerHTML = `
                <div class="bg-white rounded-2xl p-6 w-full max-w-xs text-center">
                    <h3 class="font-bold text-lg mb-2">Delete Card?</h3>
                    <p class="text-slate-500 mb-6">This action cannot be undone.</p>
                    <div class="flex gap-3">
                        <button id="cancel-del" class="flex-1 p-3 rounded-xl bg-slate-100 font-semibold">Cancel</button>
                        <button id="confirm-del" class="flex-1 p-3 rounded-xl bg-red-500 text-white font-semibold">Delete</button>
                    </div>
                </div>
            `;
            document.body.appendChild(modal);
            document.getElementById('cancel-del').onclick = () => modal.remove();
            document.getElementById('confirm-del').onclick = () => {
                removeCard(selectedCard.id);
                modal.remove();
            };
        };

        initApp();
    </script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        .safe-area-bottom { padding-bottom: env(safe-area-inset-bottom); }
        
        /* Ensure the barcode SVG scales responsibly but remains large */
        #barcode {
            width: 100%;
            height: auto;
            max-height: 250px;
            display: block;
        }

        .barcode-container {
            width: 90vw;
            max-width: 400px;
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen">

    <!-- Main View -->
    <div id="main-view" class="max-w-md mx-auto min-h-screen flex flex-col">
        <header class="p-6 flex justify-between items-center">
            <h1 class="text-3xl font-extrabold tracking-tight">My Wallet</h1>
            <button onclick="showView('add')" class="bg-indigo-600 text-white p-2 rounded-full shadow-lg active:scale-90 transition-transform">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
            </button>
        </header>

        <main class="flex-1 px-6 pb-24">
            <div id="empty-state" class="hidden flex flex-col items-center justify-center h-64 text-slate-400">
                <svg class="w-16 h-16 mb-4 opacity-20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 10h18M7 15h1m4 0h1m-7 4h12a3 3 0 003-3V8a3 3 0 00-3-3H6a3 3 0 00-3 3v8a3 3 0 003 3z"></path></svg>
                <p>No cards added yet</p>
                <button onclick="showView('add')" class="mt-4 text-indigo-600 font-medium">Add your first card</button>
            </div>
            <div id="card-list"></div>
        </main>
    </div>

    <!-- Add Card View -->
    <div id="add-card-view" class="hidden fixed inset-0 bg-white z-50 overflow-y-auto">
        <div class="max-w-md mx-auto p-6">
            <div class="flex justify-between items-center mb-8">
                <h2 class="text-2xl font-bold">Add New Card</h2>
                <button onclick="showView('main')" class="text-slate-400 hover:text-slate-600">
                    <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
            </div>

            <form id="card-form" class="space-y-6">
                <div>
                    <label class="block text-sm font-semibold text-slate-600 mb-2">Store Name</label>
                    <input name="storeName" type="text" required placeholder="e.g. Target, Costco, Starbucks" class="w-full p-4 rounded-xl border border-slate-200 focus:ring-2 focus:ring-indigo-500 outline-none transition-all">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-slate-600 mb-2">Card or Membership Number</label>
                    <input name="cardNumber" type="text" required placeholder="1234 5678 9012" class="w-full p-4 rounded-xl border border-slate-200 focus:ring-2 focus:ring-indigo-500 outline-none transition-all">
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-semibold text-slate-600 mb-2">Category</label>
                        <select name="category" class="w-full p-4 rounded-xl border border-slate-200 focus:ring-2 focus:ring-indigo-500 outline-none appearance-none bg-white">
                            <option>Supermarket</option>
                            <option>Fashion</option>
                            <option>Coffee</option>
                            <option>Dining</option>
                            <option>Entertainment</option>
                            <option>Other</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-slate-600 mb-2">Card Color</label>
                        <input name="color" type="color" value="#4F46E5" class="w-full h-[58px] rounded-xl border border-slate-200 p-1 cursor-pointer">
                    </div>
                </div>
                <button type="submit" class="w-full bg-indigo-600 text-white p-4 rounded-xl font-bold shadow-lg shadow-indigo-200 active:scale-[0.98] transition-all">
                    Save to Wallet
                </button>
            </form>
        </div>
    </div>

    <!-- Card Details / Scanner View -->
    <div id="card-details-view" class="hidden fixed inset-0 bg-slate-900 z-[60] flex flex-col">
        <div id="details-header" class="h-1/3 flex flex-col p-8 transition-colors duration-500">
            <div class="flex justify-between items-start">
                <button onclick="showView('main')" class="bg-white/20 p-2 rounded-full text-white backdrop-blur-sm">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                </button>
                <button onclick="handleDelete()" class="text-white/60 hover:text-white">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                </button>
            </div>
            <div class="mt-auto text-white">
                <h2 id="details-title" class="text-3xl font-bold mb-1">Store Name</h2>
                <p id="details-num" class="opacity-80 font-mono tracking-widest text-lg">0000 0000 0000</p>
            </div>
        </div>
        
        <div class="flex-1 bg-white rounded-t-[40px] -mt-10 p-8 flex flex-col items-center justify-center">
            <p class="text-slate-400 text-sm mb-6 uppercase tracking-[0.2em]">Hold near scanner</p>
            
            <!-- Updated container for larger barcode -->
            <div class="bg-white p-2 rounded-2xl shadow-2xl border border-slate-100 flex justify-center items-center overflow-hidden barcode-container">
                <svg id="barcode"></svg>
            </div>
            
            <div class="mt-12 text-center px-6">
                <p class="text-slate-500 text-sm leading-relaxed">Increase screen brightness to maximum for easier scanning at the checkout.</p>
            </div>
        </div>
    </div>

</body>
</html>
